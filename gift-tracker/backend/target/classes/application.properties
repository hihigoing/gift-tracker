# 应用配置
spring.application.name=gift-tracker-backend
server.port=9000

# ==================== 数据库配置 ====================
# MySQL 生产配置
spring.datasource.url=jdbc:mysql://localhost:3306/gift_tracker?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# H2 开发配置（注释掉上面的 MySQL 配置，取消注释下面的 H2 配置即可切换）
# spring.datasource.url=jdbc:h2:mem:gifthub
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# MyBatis-Plus 配置
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.type-aliases-package=com.gifttracker.model
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# ==================== JWT 配置 ====================
jwt.secret=YourSuperSecretKeyForJWTTokenGenerationMustBeLongEnoughAndSecure2026!
jwt.expiration=86400000
jwt.header=Authorization
jwt.prefix=Bearer 

# ==================== 日志配置 ====================
logging.level.com.gifttracker=DEBUG
logging.level.org.springframework.security=DEBUG
